<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 Глоссарий IT-терминов — Расширенная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding-bottom: 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.8;
            font-size: 0.95em;
        }

        /* Поисковая строка */
        .search-wrapper {
            position: sticky;
            top: 15px;
            z-index: 100;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 5px 5px 5px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: box-shadow 0.3s;
        }

        .search-box:focus-within {
            box-shadow: 0 8px 30px rgba(30, 100, 200, 0.2);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.05em;
            padding: 12px 0;
            background: transparent;
            color: #333;
        }

        .search-box input::placeholder {
            color: #aaa;
        }

        .search-box button {
            background: #1a1a2e;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .search-box button:hover {
            background: #0f3460;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.1em;
            display: none;
        }

        /* Сетка карточек */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: all 0.4s ease;
            border-left: 5px solid transparent;
            scroll-margin-top: 100px;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .card.highlight {
            border-left-color: #e94560;
            background: #fff9f9;
            animation: pulse 1.5s ease-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(233, 69, 96, 0); }
            100% { box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        }

        .card h2 {
            font-size: 1.3em;
            margin-bottom: 12px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .icon {
            font-size: 1.4em;
        }

        .card p, .card ul, .card ol {
            color: #555;
            font-size: 0.98em;
            padding-left: 0;
        }

        .card ul, .card ol {
            padding-left: 20px;
            margin: 8px 0 0 0;
        }

        .card li {
            margin-bottom: 6px;
        }

        .card strong {
            color: #1a1a2e;
        }

        .card h4 {
            color: #0f3460;
            margin: 10px 0 5px 0;
            font-size: 1em;
        }

        .search-count {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 0.9em;
        }

        .search-count span {
            font-weight: bold;
            color: #1a1a2e;
        }

        .tag-new {
            display: inline-block;
            background: #22c55e;
            color: white;
            font-size: 0.7em;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 0.85em;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6em;
            }
            .card {
                padding: 18px;
            }
            .search-box button {
                padding: 12px 18px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>📘 Глоссарий IT-терминов</h1>
        <p>Краткий справочник по ключевым понятиям информационных технологий и ИБ (расширенная версия)</p>
    </header>

    <div class="container">
        <!-- Поиск -->
        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍  Введите термин (например: SQL, виртуализация, VPN, SOC, API)...">
                <button onclick="searchCards()">Найти</button>
            </div>
        </div>

        <div class="search-count" id="searchCount"></div>
        <div class="no-results" id="noResults">😔 Ничего не найдено. Попробуйте изменить запрос.</div>

        <!-- Карточки -->
        <div class="cards-grid" id="cardsGrid"></div>

        <footer>Глоссарий IT-терминов &copy; 2026 · Расширенная версия</footer>
    </div>

    <script>
        // Данные глоссария (полностью синхронизированы с README.md)
        const glossaryData = [
            // ===== БАЗОВЫЕ ТЕРМИНЫ =====
            { term: "Виртуализация", icon: "💻", tag: "", content: 'Технология, позволяющая на одном физическом сервере создавать несколько изолированных виртуальных машин (ВМ) со своими ОС и ресурсами. <strong>Гипервизор</strong> распределяет ресурсы (ЦПУ, память) между ВМ.' },
            { term: "DNS-сервер", icon: "🌐", tag: "", content: 'Система доменных имён. Преобразует понятные человеку адреса (<code>google.com</code>) в IP-адреса (<code>142.250.185.46</code>), которые используют компьютеры для связи.' },
            { term: "Брандмауэр (Firewall)", icon: "🧱", tag: "", content: 'Сетевой фильтр, который контролирует входящий и исходящий трафик по заданным правилам. Блокирует нежелательные соединения, защищая сеть или устройство.' },
            { term: "DHCP", icon: "📡", tag: "", content: 'Протокол динамической настройки узла. Автоматически назначает устройствам в сети IP-адреса, маску подсети и другие параметры, избавляя от ручной настройки.' },
            { term: "Rate (Rate Limiting)", icon: "⏱️", tag: "", content: 'Ограничение скорости или количества запросов от пользователя/сервиса за единицу времени. Используется для защиты от перегрузок и DDoS-атак.' },
            { term: "Индекс БД", icon: "📑", tag: "", content: 'Структура данных (как алфавитный указатель в книге), ускоряющая поиск записей в таблице. <strong>Минус:</strong> замедляет операции вставки и обновления, так как индекс нужно пересчитывать.' },
            { term: "DDoS-атака", icon: "💣", tag: "", content: 'Распределенная атака типа «отказ в обслуживании». Злоумышленники с множества устройств (ботнет) создают лавину запросов, вызывая перегрузку сервера и его недоступность для пользователей.' },
            { term: "Отечественные ОС", icon: "🇷🇺", tag: "", content: 'Примеры сертифицированных российских операционных систем: <strong>Astra Linux</strong>, <strong>Альт Сервер</strong>, <strong>РЕД ОС</strong>, <strong>РОСА Хром</strong>, <strong>Calculate Linux</strong>.' },
            { term: "Сертификат ЭП (Электронной подписи)", icon: "🔏", tag: "", content: 'Электронный документ, подтверждающий личность владельца и неизменность подписанных данных. Содержит открытый ключ и реквизиты владельца, заверен Удостоверяющим центром.' },
            { term: "Мониторинг", icon: "📊", tag: "", content: 'Непрерывный сбор, анализ и оповещение о состоянии систем. Включает: <ul><li>Доступность (аптайм)</li><li>Производительность (ЦПУ, RAM)</li><li>Сетевые задержки</li><li>Логи и ошибки приложений</li></ul>' },
            { term: "Рефакторинг", icon: "🔧", tag: "", content: 'Процесс улучшения внутренней структуры кода без изменения его внешнего поведения. Цель — повысить читаемость, расширяемость и упростить поддержку.' },
            { term: "SSL и TLS", icon: "🔒", tag: "", content: 'Оба — криптографические протоколы для защиты передачи данных. <ul><li><strong>SSL</strong> — устаревший предшественник, содержит известные уязвимости.</li><li><strong>TLS</strong> — современный стандарт, более безопасные алгоритмы.</li></ul> Сейчас все используют TLS, называя это SSL по привычке.' },
            { term: "HTTP и HTTPS", icon: "🌍", tag: "", content: '<ul><li><strong>HTTP</strong> — протокол передачи гипертекста открытым текстом.</li><li><strong>HTTPS</strong> — тот же HTTP, но поверх <strong>TLS/SSL</strong>. Обеспечивает шифрование трафика, защищая данные от перехвата и подмены.</li></ul>' },
            { term: "Реляционные и нереляционные БД", icon: "🗄️", tag: "", content: '<ul><li><strong>Реляционные (SQL):</strong> Данные в виде связанных таблиц. Строгая структура, ACID-транзакции (PostgreSQL, MySQL).</li><li><strong>Нереляционные (NoSQL):</strong> Ключ-значение, документы, графы. Гибкая схема, горизонтальное масштабирование (MongoDB, Redis, Cassandra).</li></ul>' },
            { term: "API, REST и SOAP", icon: "🔌", tag: "", content: '<strong>API</strong> — интерфейс для взаимодействия программ друг с другом. <h4>Виды API:</h4> <ul><li><strong>По доступности:</strong> публичные (для всех), внутренние (для компании), партнёрские (по лицензии/договору).</li><li><strong>По реализации:</strong> Web API (HTTP/HTTPS), REST API (ресурсы через URL, методы GET/POST/PUT/DELETE), SOAP (строгий протокол, только XML, WSDL), GraphQL (клиент сам описывает нужные поля, экономия трафика).</li><li><strong>API ОС</strong> (доступ к системным ресурсам).</li><li><strong>API мобильных платформ</strong> (камера, GPS и т.д.).</li></ul>' },
            { term: "Agile, Scrum, Kanban, CI/CD", icon: "🔄", tag: "", content: '<ul><li><strong>Agile:</strong> философия гибкой разработки (Манифест).</li><li><strong>Scrum:</strong> фреймворк по Agile. Работа фиксированными итерациями (спринтами) с ролями (скрам-мастер, владелец продукта).</li><li><strong>Kanban:</strong> метод без жестких спринтов, фокус на непрерывной поставке и ограничении WIP.</li><li><strong>CI/CD:</strong> непрерывная интеграция и доставка/развертывание, автоматизация тестирования и релизов.</li></ul>' },
            { term: "Монолит vs Микросервисы", icon: "🧩", tag: "", content: '<ul><li><strong>Монолит:</strong> единое приложение, всё связано. Проще в начале, сложно масштабировать и развивать.</li><li><strong>Микросервисы:</strong> набор независимых сервисов. Технологическая свобода, точечное масштабирование, но сложнее управление инфраструктурой.</li></ul>' },
            { term: "Пентест", icon: "🕵️", tag: "", content: 'Тестирование на проникновение. Легальная имитация атаки на инфраструктуру для поиска уязвимостей и оценки реального уровня защищенности.' },
            { term: "TCP и UDP", icon: "📦", tag: "", content: '<ul><li><strong>TCP:</strong> медленнее, с гарантией доставки и порядком пакетов (устанавливает соединение). Используется для веба, почты.</li><li><strong>UDP:</strong> быстрый, без установки соединения и гарантии доставки. Используется для стримов, VoIP, онлайн-игр.</li></ul>' },
            { term: "Контейнеризация", icon: "📦", tag: "", content: 'Запуск приложения в изолированной среде (контейнере) вместе с его зависимостями. В отличие от виртуализации, использует ядро хостовой ОС — контейнеры гораздо легче и быстрее (Docker).' },
            { term: "Удаленное рабочее место (VDI)", icon: "🖥️", tag: "", content: 'Инфраструктура виртуальных рабочих столов. Рабочая среда сотрудника (ОС, приложения) запускается на сервере в ЦОДе, а пользователь видит лишь картинку на своем устройстве.' },
            { term: "Балансировка инфраструктуры", icon: "⚖️", tag: "", content: 'Распределение входящего трафика/задач между несколькими серверами (нодами). Повышает отказоустойчивость и производительность: при падении одного сервера трафик уходит на живые.' },
            { term: "Web Application Firewall (WAF)", icon: "🛡️", tag: "", content: 'Межсетевой экран уровня веб-приложений. Фильтрует HTTP/HTTPS-трафик, блокируя веб-атаки: SQL-инъекции, XSS, подбор паролей и др.' },
            { term: "Ноды", icon: "🖧", tag: "", content: 'Узел (Node) — любое устройство или процесс, являющееся частью сети/кластера. Например, сервер в кластере Kubernetes или просто компьютер в локальной сети.' },
            { term: "Шардирование БД", icon: "✂️", tag: "", content: 'Метод горизонтального масштабирования: разрезание одной большой таблицы на независимые части (шарды) и хранение их на разных серверах по определенному ключу (например, ID пользователя).' },
            { term: "Двухфакторная аутентификация (2FA)", icon: "🔐", tag: "", content: 'Защита входа по двум рубежам: «что-то, что ты знаешь» (пароль) + «что-то, что у тебя есть» (код из SMS/приложения) или «что-то, чем ты являешься» (биометрия).' },
            { term: "Аутентификация vs Авторизация", icon: "🆔", tag: "", content: '<ul><li><strong>Аутентификация:</strong> проверка личности («Кто ты?»). Ввод логина/пароля.</li><li><strong>Авторизация:</strong> проверка прав доступа («Что тебе можно?»). Проверка роли пользователя после входа.</li></ul>' },
            { term: "SIEM", icon: "📋", tag: "", content: 'Система сбора и корреляции событий безопасности. Собирает логи со всего парка устройств в реальном времени, ищет аномалии и инциденты, генерирует алерты для аналитиков.' },
            { term: "NAT", icon: "🔀", tag: "", content: 'Трансляция сетевых адресов. Механизм, позволяющий множеству устройств в частной сети выходить в интернет через один общий публичный IP-адрес, подменяя его в пакетах.' },
            { term: "7-уровневая модель OSI", icon: "🏗️", tag: "", content: '<ol><li><strong>Физический</strong> (биты/сигнал)</li><li><strong>Канальный</strong> (кадры, MAC-адреса)</li><li><strong>Сетевой</strong> (пакеты, IP, маршрутизация)</li><li><strong>Транспортный</strong> (сегменты, TCP/UDP, порты)</li><li><strong>Сеансовый</strong> (управление сессией)</li><li><strong>Представления</strong> (форматы, шифрование)</li><li><strong>Прикладной</strong> (HTTP, SMTP, DNS)</li></ol>' },
            { term: "Порядок действий при утечке информации", icon: "🚨", tag: "", content: '<ol><li><strong>Локализация:</strong> отключить скомпрометированные системы от сети.</li><li><strong>Фиксация:</strong> сохранить улики (логи, дампы памяти, скриншоты), ничего не менять на дисках.</li><li><strong>Расследование:</strong> выявить причину, вектор атаки и объем утечки.</li><li><strong>Уведомление:</strong> оповестить руководство, юристов и регуляторов (РКН) в установленные сроки.</li><li><strong>Устранение и восстановление:</strong> закрыть уязвимости, восстановить данные из резервных копий.</li></ol>' },
            { term: "СМЭВ", icon: "🏛️", tag: "", content: 'Система межведомственного электронного взаимодействия. Единая шина данных в РФ, обеспечивающая обмен документами и сведениями между государственными органами, банками и порталом «Госуслуги».' },
            { term: "Маршрутизация и коммутаторы", icon: "🔀", tag: "", content: '<ul><li><strong>Коммутатор:</strong> работает на 2-м уровне OSI, передает кадры по MAC-адресам <em>внутри</em> одной локальной сети.</li><li><strong>Маршрутизатор:</strong> работает на 3-м уровне OSI, передает пакеты по IP-адресам <em>между</em> разными сетями (выбирает маршрут).</li></ul>' },
            { term: "VPN", icon: "🔐", tag: "", content: 'Виртуальная частная сеть. Создает зашифрованный туннель между устройством и сервером. Скрывает реальный IP-адрес и обеспечивает конфиденциальность передачи данных в недоверенных сетях.' },
            { term: "Ключевые НПА в IT (РФ)", icon: "📜", tag: "", content: '<ul><li><strong>149-ФЗ:</strong> «Об информации, информационных технологиях и о защите информации».</li><li><strong>152-ФЗ:</strong> «О персональных данных».</li><li><strong>63-ФЗ:</strong> «Об электронной подписи».</li><li><strong>187-ФЗ:</strong> Безопасность критической информационной инфраструктуры (КИИ).</li><li><strong>Указы Президента (в т.ч. №250):</strong> Импортозамещение ПО.</li></ul>' },
            { term: "Документирование в проекте/коде", icon: "📝", tag: "", content: 'Обеспечивается с помощью: <ul><li>Комментариев в коде (Javadoc, Docstrings);</li><li>README-файлов с описанием архитектуры и запуска;</li><li>Автогенерации документации API (Swagger/OpenAPI);</li><li>Ведения внутренней Wiki/Confluence архитектурных решений (ADR) и инструкций.</li></ul>' },
            { term: "Резервное копирование (Бэкап)", icon: "💾", tag: "", content: 'Процесс создания копии данных для возможности их восстановления в случае потери, повреждения или сбоя. Выполняется по расписанию, должно храниться отдельно от основной системы (правило 3-2-1).' },
            { term: "SQL-инъекция", icon: "💉", tag: "", content: 'Тип атаки, при которой злоумышленник внедряет вредоносный SQL-код в поля ввода веб-приложения. Это позволяет ему обойти авторизацию, украсть, изменить или удалить данные из базы.' },
            { term: "Балансировка нагрузки", icon: "⚖️", tag: "", content: 'То же, что и балансировка инфраструктуры. Процесс распределения трафика между нодами для оптимизации скорости и предотвращения перегрузки отдельного сервера.' },
            { term: "RTO и RPO", icon: "⏳", tag: "", content: 'Метрики аварийного восстановления: <ul><li><strong>RPO (Recovery Point Objective):</strong> Максимально допустимый объем потерянных данных во времени. «Сколько данных мы готовы потерять?» (например, 1 час).</li><li><strong>RTO (Recovery Time Objective):</strong> Максимально допустимое время простоя сервиса. «Сколько времени займет восстановление?» (например, 4 часа).</li></ul>' },

            // ===== НОВЫЕ ТЕРМИНЫ =====
            { term: "SOC (Security Operations Center)", icon: "🏢", tag: "new", content: 'Центр мониторинга и реагирования на инциденты кибербезопасности. Команда специалистов, которая круглосуточно следит за ИБ-событиями в инфраструктуре, анализирует угрозы и оперативно реагирует на атаки.' },
            { term: "VGA (Video Graphics Array)", icon: "🖥️", tag: "new", content: 'Аналоговый видеоинтерфейс для подключения мониторов, разработанный IBM. Передаёт только видеосигнал (без звука). На современных устройствах вытеснен цифровыми интерфейсами: <strong>DVI</strong>, <strong>HDMI</strong> и <strong>DisplayPort</strong>.' },
            { term: "SLA (Service Level Agreement)", icon: "📄", tag: "new", content: 'Соглашение об уровне сервиса. Документ между заказчиком и поставщиком, фиксирующий метрики качества: доступность (uptime 99.9%), время реакции на инциденты, производительность. Предусматривает штрафные санкции за невыполнение условий.' },
            { term: "Действия при подозрительном письме (фишинг)", icon: "📧", tag: "new", content: '<ol><li><strong>Не открывать</strong> вложения и не переходить по ссылкам.</li><li><strong>Не отвечать</strong> отправителю.</li><li>Проверить адрес отправителя на подозрительные домены (опечатки, странные домены).</li><li>Сообщить в SOC/IT-отдел организации.</li><li>Удалить письмо или переместить в карантин антивирусной системой.</li></ol>' },
            { term: "ТЗ (Техническое задание)", icon: "📋", tag: "new", content: 'Документ, определяющий требования к разрабатываемой системе, продукту или услуге. Содержит: цели проекта, функциональные и нефункциональные требования, критерии приёмки. Является основой для договора и оценки сроков.' },
            { term: "RAIO (Relay Agent Information Option)", icon: "🔗", tag: "new", content: 'Опция 82 протокола DHCP. DHCP Relay Agent добавляет в запрос информацию о порте и устройстве клиента. Используется интернет-провайдерами для идентификации абонентов и назначения IP-адресов на основе топологии сети.' },
            { term: "Инструменты управления задачами и проектами", icon: "🛠️", tag: "new", content: 'Популярные таск-трекеры и системы управления: <ul><li><strong>Jira</strong> — гибкая система для разработки ПО (Scrum, Kanban).</li><li><strong>Confluence</strong> — корпоративная база знаний (интегрируется с Jira).</li><li><strong>Trello</strong> — простые канбан-доски.</li><li><strong>Asana</strong> — управление проектами и задачами.</li><li><strong>Yandex Tracker</strong> / <strong>Мегаплан</strong> — российские аналоги.</li><li><strong>GitLab Issues</strong> — управление задачами в связке с репозиторием.</li><li><strong>MS Project</strong> — календарное планирование и диаграммы Ганта.</li></ul>' },
            { term: "ЕИС (Единая информационная система)", icon: "🏛️", tag: "new", content: 'Официальный портал госзакупок РФ (<code>zakupki.gov.ru</code>). Функции: планирование закупок, размещение извещений и документации, сбор заявок, контроль исполнения контрактов по 44-ФЗ и 223-ФЗ, публикация реестра недобросовестных поставщиков (РНП).' },
            { term: "Риски в проектах", icon: "⚠️", tag: "new", content: '<ul><li><strong>Временны́е:</strong> срыв сроков, неправильная оценка трудозатрат.</li><li><strong>Законодательные:</strong> изменение нормативно-правовых актов, новые требования регуляторов.</li><li><strong>Экономические:</strong> рост курса валют, инфляция, удорожание компонентов.</li><li><strong>Технические:</strong> отказ оборудования, несовместимость, уязвимости безопасности.</li><li><strong>Кадровые:</strong> уход ключевых специалистов, нехватка компетенций.</li></ul>' },
            { term: "Обеспечение документирования в проекте", icon: "📚", tag: "new", content: 'Полный пакет документов включает: <ul><li><strong>Закрывающая документация:</strong> акты сдачи-приёмки, счета-фактуры, товарные накладные.</li><li><strong>Руководство пользователя:</strong> понятная инструкция для конечного пользователя системы.</li><li><strong>Руководство администратора:</strong> инструкции по установке, настройке и обслуживанию.</li><li><strong>Техническая инструкция:</strong> описание архитектуры, API, схемы базы данных.</li><li><strong>Протоколы согласования:</strong> документы, фиксирующие утверждение требований и изменений.</li></ul>' },
            { term: "TPI (Test Process Improvement)", icon: "🧪", tag: "new", content: 'Модель улучшения процессов тестирования. Аналог CMMI, но специализированный именно для тестирования ПО. Оценивает зрелость тестовых процессов и даёт дорожную карту по их развитию: от хаотичного тестирования к полностью автоматизированному и управляемому процессу.' },
            { term: "PPTP (Point-to-Point Tunneling Protocol)", icon: "🔐", tag: "new", content: 'Протокол туннелирования типа «точка-точка» для создания VPN. Создаёт зашифрованный канал передачи данных через интернет. <strong>Важно:</strong> протокол устарел и содержит критические уязвимости (шифрование MPPE легко взламывается). Вместо него рекомендуется использовать OpenVPN или WireGuard.' },
            { term: "PSEC (Provably Secure Elliptic Curve Encryption)", icon: "🔑", tag: "new", content: 'Схема шифрования на эллиптических кривых с доказуемой стойкостью. Обеспечивает конфиденциальность и целостность данных. Относится к классу криптосистем с открытым ключом, имеет математически доказанную надёжность при определённых допущениях о вычислительной сложности.' },
            { term: "Интеллектуальная собственность (ИС)", icon: "💡", tag: "new", content: 'Охраняемые результаты творческой деятельности и средства индивидуализации. Включает: авторские права (код, дизайн), патенты (изобретения), товарные знаки (бренды), коммерческую тайну (ноу-хау). Защищается положениями Гражданского кодекса РФ и международными соглашениями.' },
            { term: "DHCP — подробнее", icon: "📡", tag: "new", content: '<strong>Dynamic Host Configuration Protocol</strong> работает по алгоритму DORA: <ul><li><strong>D</strong>iscover — клиент широковещательно ищет DHCP-сервер.</li><li><strong>O</strong>ffer — сервер предлагает IP-адрес.</li><li><strong>R</strong>equest — клиент запрашивает предложенный адрес.</li><li><strong>A</strong>cknowledge — сервер подтверждает аренду.</li></ul> Назначает IP-адрес, маску подсети, основной шлюз и DNS-серверы на определённый срок (lease time).' },
            { term: "BI (Business Intelligence)", icon: "📈", tag: "new", content: 'Системы бизнес-анализа. Собирают данные из различных источников, преобразуют их и визуализируют в виде интерактивных дашбордов. Помогают руководству принимать решения на основе данных. Примеры инструментов: <strong>Power BI</strong>, <strong>Tableau</strong>, <strong>Yandex DataLens</strong>, <strong>Apache Superset</strong>.' },
            { term: "Формирование бюджета (НМЦК)", icon: "💰", tag: "new", content: 'Начальная максимальная цена контракта по 44-ФЗ. Основные методы расчёта: <ul><li><strong>Метод сопоставимых рыночных цен (анализ рынка):</strong> сбор коммерческих предложений (КП) от ≥3 потенциальных поставщиков и расчёт средней/минимальной цены. Формула: средняя стоимость = сумма всех КП / количество КП (после отсечения статистических выбросов).</li><li>Также применяются: нормативный, тарифный, проектно-сметный и затратный методы.</li></ul>' },
            { term: "Что можно автоматизировать с помощью ИИ", icon: "🤖", tag: "new", content: '<ul><li>Поддержка клиентов (чат-боты, автоматическая обработка тикетов).</li><li>Генерация и рефакторинг кода (Copilot, ChatGPT, Codeium).</li><li>Анализ логов и выявление аномалий (SOC/SIEM).</li><li>Создание контента (тексты, изображения, презентации).</li><li>Распознавание и синтез речи, компьютерное зрение.</li><li>Прогнозирование нагрузки на серверы и потребления ресурсов.</li></ul>' },
            { term: "Функционал ОС", icon: "⚙️", tag: "new", content: 'Операционная система — главный посредник между аппаратным обеспечением и прикладными программами. Ключевые функции: <ul><li>Управление процессами (запуск, планирование, завершение) и оперативной памятью.</li><li>Организация файловой системы (чтение, запись, права доступа).</li><li>Драйверы устройств (обеспечение взаимодействия с оборудованием).</li><li>Пользовательский интерфейс (GUI — графический, CLI — командная строка).</li><li>Сетевое взаимодействие (стек TCP/IP).</li><li>Обеспечение безопасности и разграничения доступа пользователей.</li></ul>' },
            { term: "Матрица доступа", icon: "🗂️", tag: "new", content: 'Таблица, определяющая права субъектов (пользователей/ролей) на объекты (файлы, папки, сетевые ресурсы). Строки — субъекты, столбцы — объекты. На пересечении указываются права: чтение (R), запись (W), выполнение (X), удаление (D). Лежит в основе дискреционной модели разграничения доступа.' },
            { term: "Характеристики сервера", icon: "🖧", tag: "new", content: 'Ключевые параметры при выборе или проектировании сервера: <ul><li><strong>Форм-фактор:</strong> Tower (напольный), Rack (стоечный, от 1U до 4U), Blade (лезвие).</li><li><strong>ЦПУ:</strong> количество ядер/потоков, тактовая частота, кэш-память (Intel Xeon, AMD EPYC).</li><li><strong>RAM:</strong> объём (ГБ/ТБ), тип (DDR4/DDR5), наличие ECC (коррекция ошибок).</li><li><strong>Дисковая подсистема:</strong> тип накопителей (SATA SSD, NVMe SSD, SAS HDD), аппаратный RAID-контроллер.</li><li><strong>Сетевые интерфейсы:</strong> скорость портов (1/10/25/100 Гбит/с), количество портов.</li><li><strong>Блоки питания:</strong> поддержка горячей замены (hot-swap), резервирование (N+1).</li></ul>' }
        ];

        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const searchCount = document.getElementById('searchCount');

        // Рендер всех карточек
        function renderCards(data) {
            cardsGrid.innerHTML = '';
            if (data.length === 0) {
                noResults.style.display = 'block';
                searchCount.innerHTML = '';
            } else {
                noResults.style.display = 'none';
                searchCount.innerHTML = `Найдено: <span>${data.length}</span> из ${glossaryData.length}`;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${index}`;
                const tagHtml = item.tag === 'new' ? '<span class="tag-new">New</span>' : '';
                card.innerHTML = `
                    <h2><span class="icon">${item.icon}</span> ${item.term} ${tagHtml}</h2>
                    <div>${item.content}</div>
                `;
                cardsGrid.appendChild(card);
            });
        }

        // Поиск с подсветкой и скроллом
        function searchCards() {
            const query = searchInput.value.trim().toLowerCase();

            if (query === '') {
                renderCards(glossaryData);
                document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            // Фильтруем (по названию, содержимому, а также по ключевым словам в скобках)
            const filtered = glossaryData.filter(item =>
                item.term.toLowerCase().includes(query) ||
                item.content.toLowerCase().replace(/<[^>]*>/g, '').includes(query)
            );

            renderCards(filtered);

            // Подсвечиваем первую найденную карточку и скроллим к ней
            setTimeout(() => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
                const firstCard = document.querySelector('.card');
                if (firstCard) {
                    firstCard.classList.add('highlight');
                    firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // Поиск по Enter
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCards();
            }
        });

        // Живой поиск при вводе (с задержкой)
        let debounceTimer;
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                searchCards();
            }, 400);
        });

        // Изначальный рендер
        renderCards(glossaryData);
    </script>

</body>
